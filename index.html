<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📝 SRT Private Memo Board</title>
<style>
  :root {
    --bg-color: #0f172a;
    --card-bg: rgba(30, 41, 59, 0.75);
    --text-color: #f8fafc;
    --accent-color: #38bdf8;
    --border-color: rgba(255, 255, 255, 0.1);
  }
  body, html {
    margin: 0; padding: 0;
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    min-height: 100vh;
  }
  .blur-bg {
    filter: blur(8px);
    transition: filter 0.5s ease;
  }
  .lock-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15, 23, 42, 0.96);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 9999;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }
  .lock-box {
    background: var(--card-bg);
    padding: 30px; border-radius: 16px;
    border: 1px solid var(--border-color);
    text-align: center;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
    max-width: 90%; width: 320px;
  }
  .lock-box h2 { margin-top: 0; color: var(--accent-color); font-size: 24px; }
  .lock-box p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
  .lock-input {
    width: 100%; padding: 12px; border-radius: 8px;
    border: 1px solid var(--border-color);
    background: rgba(15, 23, 42, 0.6);
    color: #fff; text-align: center; font-size: 16px;
    box-sizing: border-box; margin-bottom: 15px;
    outline: none; transition: border-color 0.3s;
  }
  .lock-input:focus { border-color: var(--accent-color); }
  .lock-btn {
    width: 100%; padding: 12px; border-radius: 8px;
    background: var(--accent-color);
    color: #0f172a; font-weight: bold; border: none;
    font-size: 16px; cursor: pointer; transition: opacity 0.2s;
  }
  .lock-btn:hover { opacity: 0.9; }
  
  .container { max-width: 1200px; margin: 0 auto; padding: 25px; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
  h1 { margin: 0; font-size: 28px; color: var(--accent-color); display: flex; align-items: center; gap: 10px; }
  .search-bar {
    width: 100%; max-width: 400px; padding: 10px 18px; border-radius: 20px;
    border: 1px solid var(--border-color);
    background: var(--card-bg); color: #fff; outline: none;
  }
  .search-bar:focus { border-color: var(--accent-color); }
  
  .logout-btn {
    background: transparent; color: #94a3b8; border: 1px solid var(--border-color);
    padding: 6px 12px; border-radius: 12px; cursor: pointer; font-size: 13px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .logout-btn:hover { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.2); }
  
  .add-btn {
    background: var(--accent-color); color: #0f172a; border: none;
    padding: 8px 16px; border-radius: 12px; cursor: pointer; font-size: 14px;
    font-weight: bold; transition: all 0.2s;
    white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.9; transform: scale(1.02); }
  
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--card-bg);
    border-radius: 12px; padding: 20px;
    border: 1px solid var(--border-color);
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
    border-color: var(--accent-color);
  }
  
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 10px; }
  .card-title { font-size: 18px; font-weight: bold; color: var(--accent-color); margin: 0; line-height: 1.3; }
  .card-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .action-icon {
    cursor: pointer; color: #64748b; transition: color 0.2s; font-size: 14px;
    background: transparent; border: none; padding: 2px 4px;
  }
  .action-icon:hover { color: var(--accent-color); }
  .action-icon-delete:hover { color: #ef4444; }
  
  .card-date { font-size: 12px; color: #64748b; margin-bottom: 15px; }
  .card-body { font-size: 14px; line-height: 1.6; color: #cbd5e1; white-space: pre-wrap; flex-grow: 1; }

  /* 모달 스타일 */
  .modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15, 23, 42, 0.85);
    display: none; justify-content: center; align-items: center;
    z-index: 10000;
  }
  .modal-box {
    background: #1e293b;
    padding: 25px; border-radius: 16px;
    border: 1px solid var(--border-color);
    width: 90%; max-width: 500px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  }
  .modal-box h3 { margin-top: 0; color: var(--accent-color); font-size: 20px; margin-bottom: 20px; }
  .modal-input {
    width: 100%; padding: 12px; border-radius: 8px;
    border: 1px solid var(--border-color);
    background: rgba(15, 23, 42, 0.6);
    color: #fff; font-size: 15px;
    box-sizing: border-box; margin-bottom: 15px;
    outline: none; transition: border-color 0.3s;
  }
  .modal-textarea {
    width: 100%; height: 180px; padding: 12px; border-radius: 8px;
    border: 1px solid var(--border-color);
    background: rgba(15, 23, 42, 0.6);
    color: #fff; font-size: 14px;
    box-sizing: border-box; margin-bottom: 20px;
    outline: none; resize: none; transition: border-color 0.3s;
    font-family: inherit; line-height: 1.6;
  }
  .modal-input:focus, .modal-textarea:focus { border-color: var(--accent-color); }
  .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; }
  .modal-btn {
    padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 14px;
  }
  .modal-btn-cancel { background: #475569; color: #f8fafc; }
  .modal-btn-save { background: var(--accent-color); color: #0f172a; }
</style>
</head>
<body>

<div id="lockScreen" class="lock-screen">
  <div class="lock-box">
    <h2>🔒 Private Board</h2>
    <p style="color: #64748b; font-size: 14px;">보안 잠금 해제 및 복호화를 진행해줘냥! 🐱</p>
    <input type="password" id="manualPassword" class="lock-input" placeholder="비밀번호 입력..." onkeypress="if(event.key==='Enter') submitManualLogin()">
    <input type="password" id="manualToken" class="lock-input" placeholder="깃허브 토큰 입력 (글쓰기 권한 - 선택)..." onkeypress="if(event.key==='Enter') submitManualLogin()">
    <button class="lock-btn" onclick="submitManualLogin()">잠금 해제 🔓</button>
    <p id="errorMsg" class="error-msg" style="color: #ef4444; font-size: 12px; margin-top: 10px; display: none;"></p>
  </div>
</div>

<div id="mainContent" class="container blur-bg">
  <header>
    <h1>📝 SRT Private Memo</h1>
    <div style="display: flex; align-items: center; gap: 12px; flex-wrap: nowrap;">
      <input type="text" id="search" class="search-bar" placeholder="🔍 메모 검색..." oninput="filterMemos()">
      <button class="add-btn" onclick="openNewMemoModal()">➕ 새 메모</button>
      <button class="logout-btn" onclick="logout()">🔒 로그아웃</button>
    </div>
  </header>
  <div id="memoGrid" class="grid"></div>
</div>

<!-- 모달 팝업 -->
<div id="memoModal" class="modal">
  <div class="modal-box">
    <h3 id="modalTitleText">➕ 새 메모 작성</h3>
    <input type="hidden" id="editingMemoId">
    <input type="text" id="memoTitleInput" class="modal-input" placeholder="제목을 입력하세요냥...">
    <textarea id="memoContentInput" class="modal-textarea" placeholder="내용을 입력하세요냥..."></textarea>
    <div class="modal-buttons">
      <button class="modal-btn modal-btn-cancel" onclick="closeMemoModal()">취소</button>
      <button class="modal-btn modal-btn-save" id="modalSaveBtn" onclick="saveMemo()">저장하기</button>
    </div>
  </div>
</div>

<script>
const GITHUB_ID = "forsys02";
const REPO = "srt-memos";
let allMemos = [];
let memosFileSha = null;

let decryptedToken = null;
let serverPassword = null;

async function decryptData(encryptedB64, password) {
    const raw = atob(encryptedB64);
    const bytes = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) {
        bytes[i] = raw.charCodeAt(i);
    }
    const salt = bytes.slice(0, 16);
    const iv = bytes.slice(16, 28);
    const ciphertext = bytes.slice(28);
    
    const encoder = new TextEncoder();
    const pwBytes = encoder.encode(password);
    const baseKey = await crypto.subtle.importKey(
        "raw", pwBytes, "PBKDF2", false, ["deriveKey"]
    );
    const key = await crypto.subtle.deriveKey(
        {
            name: "PBKDF2",
            salt: salt,
            iterations: 100000,
            hash: "SHA-256"
        },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
    );
    try {
        const decrypted = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: iv, tagLength: 128 },
            key,
            ciphertext
        );
        return new TextDecoder().decode(decrypted);
    } catch (e) {
        throw new Error("비밀번호가 맞지 않거나 손상된 데이터다냥! 😿");
    }
}

async function encryptData(dataStr, password) {
    const salt = window.crypto.getRandomValues(new Uint8Array(16));
    const iv = window.crypto.getRandomValues(new Uint8Array(12));
    
    const encoder = new TextEncoder();
    const pwBytes = encoder.encode(password);
    const baseKey = await crypto.subtle.importKey(
        "raw", pwBytes, "PBKDF2", false, ["deriveKey"]
    );
    const key = await crypto.subtle.deriveKey(
        {
            name: "PBKDF2",
            salt: salt,
            iterations: 100000,
            hash: "SHA-256"
        },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt"]
    );
    const encrypted = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv: iv, tagLength: 128 },
        key,
        encoder.encode(dataStr)
    );
    
    const encryptedBytes = new Uint8Array(encrypted);
    const payload = new Uint8Array(16 + 12 + encryptedBytes.length);
    payload.set(salt, 0);
    payload.set(iv, 16);
    payload.set(encryptedBytes, 28);
    
    let binStr = "";
    for (let i = 0; i < payload.length; i++) {
        binStr += String.fromCharCode(payload[i]);
    }
    return btoa(binStr);
}

function parseHash() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    return {
        key: params.get("key"),
        token: params.get("token")
    };
}

async function init() {
    const hashParams = parseHash();
    let urlKey = hashParams.key;
    let urlToken = hashParams.token;
    
    if (!urlKey) {
        urlKey = localStorage.getItem("srt_board_key");
    }
    if (!urlToken) {
        urlToken = localStorage.getItem("srt_board_enc_token");
    }
    
    if (urlKey && urlToken) {
        serverPassword = urlKey;
        try {
            const decodedTokenParam = decodeURIComponent(urlToken);
            decryptedToken = await decryptData(decodedTokenParam, serverPassword);
            
            localStorage.setItem("srt_board_key", serverPassword);
            localStorage.setItem("srt_board_enc_token", decodedTokenParam);
            
            document.getElementById("lockScreen").style.display = "none";
            document.getElementById("mainContent").classList.remove("blur-bg");
            
            history.replaceState(null, '', window.location.pathname);
            loadMemos();
        } catch (e) {
            showLockScreen("비밀번호 또는 인증 토큰 복호화 실패했어냥! 😿");
        }
    } else {
        showLockScreen();
    }
}

function showLockScreen(errorMsg = "") {
    document.getElementById("lockScreen").style.display = "flex";
    document.getElementById("mainContent").classList.add("blur-bg");
    const errorEl = document.getElementById("errorMsg");
    if (errorMsg) {
        errorEl.innerText = errorMsg;
        errorEl.style.display = "block";
    } else {
        errorEl.style.display = "none";
    }
}

async function submitManualLogin() {
    const pwInput = document.getElementById("manualPassword").value.trim();
    const tokenInput = document.getElementById("manualToken").value.trim();
    
    if (!pwInput) {
        alert("비밀번호를 입력해줘냥! 🔒");
        return;
    }
    
    serverPassword = pwInput;
    if (tokenInput) {
        decryptedToken = tokenInput;
        try {
            const encToken = await encryptData(decryptedToken, serverPassword);
            localStorage.setItem("srt_board_key", serverPassword);
            localStorage.setItem("srt_board_enc_token", encToken);
        } catch (e) {
            console.error(e);
        }
    } else {
        const savedEncToken = localStorage.getItem("srt_board_enc_token");
        if (savedEncToken) {
            try {
                decryptedToken = await decryptData(savedEncToken, serverPassword);
                localStorage.setItem("srt_board_key", serverPassword);
            } catch (e) {
                showLockScreen("비밀번호가 올바르지 않거나 저장된 토큰 복호화에 실패했다냥! 😿");
                return;
            }
        } else {
            decryptedToken = null;
        }
    }
    
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("mainContent").classList.remove("blur-bg");
    loadMemos();
}

function logout() {
    if (confirm("정말 로그아웃 하시겠어냥? 🔒")) {
        localStorage.removeItem("srt_board_key");
        localStorage.removeItem("srt_board_enc_token");
        location.reload();
    }
}

async function loadMemos() {
    const fileUrl = `https://api.github.com/repos/${GITHUB_ID}/${REPO}/contents/memos.json`;
    const headers = {};
    if (decryptedToken) {
        headers['Authorization'] = `token ${decryptedToken}`;
    }
    headers['Accept'] = 'application/vnd.github+json';
    
    try {
        const res = await fetch(fileUrl + '?t=' + Date.now(), { headers });
        if (res.status === 404) {
            allMemos = [];
            renderMemos(allMemos);
            return;
        }
        const data = await res.json();
        memosFileSha = data.sha;
        const contentDecoded = atob(data.content.replace(/\n/g, ''));
        const decodedText = await decryptData(contentDecoded, serverPassword);
        allMemos = JSON.parse(decodedText);
        renderMemos(allMemos);
    } catch (err) {
        console.error(err);
        fetch(`https://raw.githubusercontent.com/${GITHUB_ID}/${REPO}/main/memos.json?t=` + Date.now())
            .then(res => res.text())
            .then(async dataText => {
                try {
                    let encryptedData = dataText;
                    try {
                        const parsedJson = JSON.parse(dataText);
                        if (parsedJson && parsedJson.content) {
                            encryptedData = parsedJson.content;
                        }
                    } catch(e) {}
                    
                    const decodedText = await decryptData(encryptedData.trim(), serverPassword);
                    allMemos = JSON.parse(decodedText);
                    renderMemos(allMemos);
                } catch(e) {
                    showLockScreen("비밀번호가 틀렸거나 데이터 복호화에 실패했어냥! 😿");
                }
            })
            .catch(e => {
                document.getElementById("memoGrid").innerHTML = "<p>데이터를 로드하는 데 실패했어냥... 😿</p>";
            });
    }
}

function renderMemos(memos) {
    const grid = document.getElementById("memoGrid");
    grid.innerHTML = "";
    
    const addBtn = document.querySelector(".add-btn");
    if (!decryptedToken) {
        if (addBtn) addBtn.style.display = "none";
    } else {
        if (addBtn) addBtn.style.display = "block";
    }
    
    if (memos.length === 0) {
        grid.innerHTML = "<p style='color: #64748b; grid-column: 1/-1; text-align: center;'>작성된 메모가 없어냥! 📝</p>";
        return;
    }
    memos.forEach(m => {
        const card = document.createElement("div");
        card.className = "card";
        
        const actionHtml = decryptedToken ? `
            <div class="card-actions">
                <button class="action-icon" onclick="openEditMemoModal('${m.id}')" title="수정">✏️</button>
                <button class="action-icon action-icon-delete" onclick="deleteMemo('${m.id}')" title="삭제">🗑️</button>
            </div>
        ` : '';
        
        card.innerHTML = `
            <div class="card-header">
                <h3 class="card-title">${escapeHtml(m.title)}</h3>
                ${actionHtml}
            </div>
            <div class="card-date">📅 ${m.created_at}</div>
            <div class="card-body">${escapeHtml(m.content)}</div>
        `;
        grid.appendChild(card);
    });
}

function openNewMemoModal() {
    document.getElementById("modalTitleText").innerText = "➕ 새 메모 작성";
    document.getElementById("editingMemoId").value = "";
    document.getElementById("memoTitleInput").value = "";
    document.getElementById("memoContentInput").value = "";
    document.getElementById("memoModal").style.display = "flex";
    document.getElementById("memoTitleInput").focus();
}

function openEditMemoModal(memoId) {
    const memo = allMemos.find(m => m.id === memoId);
    if (!memo) return;
    document.getElementById("modalTitleText").innerText = "✏️ 메모 수정";
    document.getElementById("editingMemoId").value = memoId;
    document.getElementById("memoTitleInput").value = memo.title;
    document.getElementById("memoContentInput").value = memo.content;
    document.getElementById("memoModal").style.display = "flex";
    document.getElementById("memoContentInput").focus();
}

function closeMemoModal() {
    document.getElementById("memoModal").style.display = "none";
}

async function pushMemosToGithub(updatedMemos) {
    if (!decryptedToken) {
        alert("깃허브 쓰기 토큰 권한이 없어냥! 😿");
        return;
    }
    const fileUrl = `https://api.github.com/repos/${GITHUB_ID}/${REPO}/contents/memos.json`;
    const headers = {
        'Authorization': `token ${decryptedToken}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
    };
    
    try {
        const memosStr = JSON.stringify(updatedMemos, null, 2);
        const encryptedMemos = await encryptData(memosStr, serverPassword);
        const contentEncoded = btoa(encryptedMemos);
        
        try {
            const getRes = await fetch(fileUrl + '?t=' + Date.now(), { headers: { 'Authorization': `token ${decryptedToken}` } });
            const getData = await getRes.json();
            memosFileSha = getData.sha;
        } catch (e) {
            console.error("Failed to sync latest SHA before push:", e);
        }
        
        const payload = {
            "message": "Update encrypted memos.json via Web Editor",
            "content": contentEncoded,
            "sha": memosFileSha
        };
        
        const res = await fetch(fileUrl, {
            method: 'PUT',
            headers: headers,
            body: JSON.stringify(payload)
        });
        
        if (res.ok) {
            const resData = await res.json();
            memosFileSha = resData.content.sha;
            allMemos = updatedMemos;
            renderMemos(allMemos);
            closeMemoModal();
        } else {
            const errData = await res.json();
            alert("깃허브 저장소 업로드 실패냥! 😿 에러: " + (errData.message || res.statusText));
        }
    } catch(e) {
        alert("오류 발생냥: " + e.message);
    }
}

async function saveMemo() {
    const title = document.getElementById("memoTitleInput").value.trim();
    const content = document.getElementById("memoContentInput").value.trim();
    const memoId = document.getElementById("editingMemoId").value;
    
    if (!title) {
        alert("제목을 입력해줘냥! 📝");
        return;
    }
    if (!content) {
        alert("내용을 입력해줘냥! 📝");
        return;
    }
    
    const saveBtn = document.getElementById("modalSaveBtn");
    saveBtn.disabled = true;
    saveBtn.innerText = "저장 중...";
    
    try {
        let updated = [...allMemos];
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const mi = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        const nowStr = `${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`;
        
        if (memoId) {
            updated = updated.map(m => {
                if (m.id === memoId) {
                    return { ...m, title, content, created_at: nowStr };
                }
                return m;
            });
        } else {
            const newId = new Date().getTime() + "_" + Math.floor(Math.random() * 1000);
            updated.unshift({
                id: newId,
                title,
                content,
                created_at: nowStr
            });
        }
        
        await pushMemosToGithub(updated);
    } catch (e) {
        alert("오류 발생냥: " + e.message);
    } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = "저장하기";
    }
}

async function deleteMemo(memoId) {
    if (!confirm("정말 이 글을 삭제할까냥? 🗑️")) return;
    
    try {
        const updated = allMemos.filter(m => m.id !== memoId);
        await pushMemosToGithub(updated);
    } catch (e) {
        alert("삭제 실패냥: " + e.message);
    }
}

function filterMemos() {
    const query = document.getElementById("search").value.toLowerCase();
    const filtered = allMemos.filter(m => 
        m.title.toLowerCase().includes(query) || 
        m.content.toLowerCase().includes(query)
    );
    renderMemos(filtered);
}

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

init();
</script>
